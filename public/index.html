<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dithr Me | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), 
                        url('background.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            animation: fadeIn 3s ease-in-out;
        }

        h1 {
            font-size: 4rem;
                font-weight: 400;
                letter-spacing: 12px;
                text-transform: uppercase;
                margin-bottom: 1rem;
                text-shadow: 
                    0 8px 15px rgba(0, 0, 0, 0.9),
                    0 12px 35px rgba(0, 0, 0, 0.5),
                    0 0 25px rgba(255, 255, 255, 0.1);
                animation: floatLoop 6s ease-in-out infinite;
                display: inline-block;
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            max-width: 600px;
            opacity: 0.7;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
            animation: entranceFade 1s ease-out forwards;
        }
        @keyframes entranceFade {
            0% { 
                opacity: 0; 
                filter: blur(10px);
                transform: scale(0.95);
            }
            100% { 
                opacity: 1; 
                filter: blur(0);
                transform: scale(1);
            }
        }
        @keyframes floatLoop {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px); /* Drift upwards */
            }
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; letter-spacing: 6px; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="content">
        <h1>Dithr.Me</h1>
        <p>You can't fight your online presence</p>
        <p>Dilute it with noise</p>
    </div>

</body>
</html>
